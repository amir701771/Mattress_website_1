<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <linearGradient id="proGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="blueMattress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#proGrad)" />
  <g transform="translate(60, 40)">
    <!-- Base -->
    <rect x="0" y="80" width="280" height="20" rx="4" fill="#334155" />
    <!-- Mattress Body -->
    <rect x="0" y="20" width="280" height="60" rx="8" fill="url(#blueMattress)" />
    <!-- Firmness lines/texture -->
    <line x1="40" y1="20" x2="40" y2="80" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <line x1="80" y1="20" x2="80" y2="80" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <line x1="120" y1="20" x2="120" y2="80" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <line x1="160" y1="20" x2="160" y2="80" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <line x1="200" y1="20" x2="200" y2="80" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <line x1="240" y1="20" x2="240" y2="80" stroke="#475569" stroke-width="2" stroke-dasharray="4 4" />
    <!-- Accent line -->
    <rect x="0" y="45" width="280" height="8" fill="#007bff" />
  </g>
  <text x="50%" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#007bff">MATTRESS PRO (EXTRA SUPPORT)</text>
</svg>
