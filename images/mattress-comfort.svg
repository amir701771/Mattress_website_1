<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <linearGradient id="comfortGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a4365" />
      <stop offset="100%" stop-color="#1a365d" />
    </linearGradient>
    <linearGradient id="foamMattress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#comfortGrad)" />
  <g transform="translate(60, 40)">
    <!-- Base -->
    <rect x="0" y="80" width="280" height="20" rx="4" fill="#4a5568" />
    <!-- Mattress Body with Visible Comfort Layers -->
    <rect x="0" y="20" width="280" height="60" rx="8" fill="url(#foamMattress)" />
    <!-- Layer Lines -->
    <line x1="0" y1="35" x2="280" y2="35" stroke="#a0aec0" stroke-width="2" />
    <line x1="0" y1="50" x2="280" y2="50" stroke="#a0aec0" stroke-width="2" />
    <line x1="0" y1="65" x2="280" y2="65" stroke="#a0aec0" stroke-width="2" />
    <!-- Wave pattern to show soft comfort layer -->
    <path d="M 0 25 Q 10 20, 20 25 T 40 25 T 60 25 T 80 25 T 100 25 T 120 25 T 140 25 T 160 25 T 180 25 T 200 25 T 220 25 T 240 25 T 260 25 T 280 25" fill="none" stroke="#2f8f84" stroke-width="2" />
    <!-- Accent Pillow -->
    <rect x="15" y="8" width="50" height="12" rx="3" fill="#ffffff" stroke="#cbd5e1" />
  </g>
  <text x="50%" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#2f8f84">MATTRESS COMFORT (HYBRID PLUSH)</text>
</svg>
